name: NeoStore Index Updater API

on:
  release:
    types: [published, edited, deleted]

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Run Index Update via API
        uses: actions/github-script@v7
        with:
          script: |
            // 1. Alle Releases direkt von GitHub holen
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const storeApps = [];
            const seenAppIds = {};
            const fallbackIcon = "https://upload.wikimedia.org/wikipedia/commons/thumb/d/df/TV_icon.svg/512px-TV_icon.svg.png";

            for (const release of releases) {
              if (release.prerelease) continue;

              const ipkAsset = release.assets.find(a => a.name.endsWith('.ipk'));
              if (!ipkAsset) continue;

              let appId = "com.neoos.app.custom";
              let appVersion = release.tag_name;

              if (release.tag_name && release.tag_name.includes('/')) {
                const parts = release.tag_name.split('/');
                appId = parts[0];
                parts.shift();
                appVersion = parts.join('/');
              }

              if (seenAppIds[appId]) continue;

              const iconAsset = release.assets.find(a => a.name.toLowerCase().includes('icon.'));
              const appIconUrl = iconAsset ? iconAsset.browser_download_url : fallbackIcon;

              seenAppIds[appId] = true;

              storeApps.push({
                id: appId,
                title: release.name || "Unbenanntes Paket",
                version: appVersion,
                description: release.body || "Keine Beschreibung verfügbar.",
                logo: appIconUrl,
                url: ipkAsset.browser_download_url
              });
            }

            const jsonString = JSON.stringify(storeApps, null, 2);
            const path = 'app_index.json';
            
            // 2. SHA-Hash der eventuell existierenden Datei holen
            let sha;
            try {
              const { data: fileData } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: path,
                ref: 'refs/heads/main'
              });
              sha = fileData.sha;
            } catch (e) {
              // Datei existiert noch nicht, kein Problem
            }

            // 3. Datei direkt via API in den main-Branch jagen
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: path,
              message: 'Anwendungs-Index automatisch aktualisiert [skip ci]',
              content: Buffer.from(jsonString).toString('base64'),
              branch: 'main',
              sha: sha
            });
            
            console.log("Die app_index.json wurde erfolgreich ohne Git-CLI aktualisiert!");
            
